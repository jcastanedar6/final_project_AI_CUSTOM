<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Examen Final IA - CAG Lab</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <p class="eyebrow">Modulo 3 · Examen Final</p>
        <h1>CAG Lab</h1>
        <p class="lead">Integra memoria contextual persistente en un asistente que ya recupera conocimiento del curso.</p>
      </section>

      <section class="workspace">
        <form id="ask-form" class="card ask-card">
          <label for="user-id">Usuario</label>
          <input id="user-id" name="user_id" value="student-01" />

          <label for="question">Pregunta</label>
          <textarea id="question" name="question" rows="5" placeholder="Pregunta sobre RAG, CAG, SDD, BDD o TDD"></textarea>

          <button type="submit">Preguntar al asistente</button>
        </form>

        <aside class="card context-card">
          <p class="panel-label">Panel CAG</p>
          <h2 id="context-title">Contexto</h2>

          <form id="context-form" class="context-form">
            <div class="context-form-row">
              <input id="ctx-key" name="key" placeholder="clave" />
              <input id="ctx-value" name="value" placeholder="valor" />
              <button type="submit" class="btn-save">Guardar</button>
            </div>
          </form>

          <div id="context-output" class="context-list">
            <p class="context-empty">Sin contexto guardado.</p>
          </div>
        </aside>
      </section>

      <section class="card response-card" id="response-card">
        <p class="panel-label">Respuesta</p>
        <div id="answer-output" class="answer-placeholder">Todavia no hiciste una pregunta.</div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
